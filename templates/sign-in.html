<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <meta name="theme-color" content="#10b981">
        <title>Sign In</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='base_styles.css') }}">
    </head>
    <body class="auth-page">
      
        <h1>Sign In</h1>
        <p class="auth-subtitle">Access your portal</p>
        <form action="/sign-in-api" method="post">
            <input type="text" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign In</button>
        </form>
        <a class="auth-footer" href="/sign-up">Don't have an account? Sign up</a>
    </body>
</html>
